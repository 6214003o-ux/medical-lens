<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>医学論文リアルタイム翻訳</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100dvh; overflow: hidden; touch-action: none; }

        /* セットアップ画面 */
        #setup {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100dvh; padding: 24px;
            text-align: center; background: #111;
        }
        #setup h1 { font-size: 1.4em; margin-bottom: 12px; }
        #setup p  { color: #aaa; font-size: 0.9em; margin-bottom: 24px; line-height: 1.6; }
        #setup input {
            width: 100%; padding: 14px; font-size: 1em; border-radius: 10px;
            border: 1px solid #444; background: #222; color: #fff; margin-bottom: 12px;
        }
        #setup button {
            width: 100%; padding: 16px; font-size: 1.1em;
            background: #4285f4; color: #fff; border: none; border-radius: 10px; cursor: pointer;
        }
        .note { font-size: 0.78em; color: #666; margin-top: 14px; }

        /* メイン画面 */
        #app { display: none; position: relative; height: 100dvh; flex-direction: column; }

        #camera-wrap {
            position: relative; width: 100%; height: 52dvh; background: #000; overflow: hidden;
        }
        #video {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        /* フォーカス枠：カメラ中央のこのエリアを翻訳する */
        #focus-frame {
            position: absolute;
            top: 15%; left: 10%; right: 10%; bottom: 15%;
            border: 2px solid rgba(66,133,244,0.8);
            border-radius: 6px;
            pointer-events: none;
        }
        #focus-label {
            position: absolute; top: calc(15% - 22px); left: 10%;
            font-size: 0.72em; color: rgba(66,133,244,0.9);
            background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px;
        }

        /* ステータスバー */
        #status-bar {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background: rgba(0,0,0,0.6); z-index: 10;
        }
        #status-text { font-size: 0.78em; color: #ccc; }
        #toggle-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 6px 14px; border-radius: 20px;
            font-size: 0.82em; cursor: pointer;
        }
        #reset-btn {
            background: none; border: none; color: #666; font-size: 0.75em; cursor: pointer;
        }

        /* 翻訳ボックス */
        #translation-box {
            position: absolute; bottom: 0; left: 0; right: 0; height: 48dvh;
            background: rgba(10,10,10,0.96); padding: 14px 16px 20px; overflow-y: auto;
            border-top: 1px solid #222;
        }
        #translation-label {
            font-size: 0.72em; color: #555; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
        }
        #translation-text {
            font-size: 1.05em; line-height: 1.8; color: #f0f0f0; white-space: pre-wrap;
        }
        #loading-indicator {
            display: none; color: #4285f4; font-size: 0.85em; margin-top: 6px;
        }
    </style>
</head>
<body>

<!-- セットアップ -->
<div id="setup">
    <h1>📋 医学論文翻訳</h1>
    <p>Gemini APIキーを入力してください。<br>一度入力すれば次回から不要です。</p>
    <input type="password" id="api-key-input" placeholder="AIza...（Google AI Studioで取得）">
    <button onclick="saveAndStart()">翻訳を開始する</button>
    <p class="note">APIキーはこのデバイス内にのみ保存されます。</p>
</div>

<!-- メイン -->
<div id="app">
    <div id="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div id="focus-frame"></div>
        <div id="focus-label">このエリアの英語を翻訳</div>

        <div id="status-bar">
            <span id="status-text">起動中...</span>
            <button id="toggle-btn" onclick="togglePause()">⏸ 停止</button>
            <button id="reset-btn" onclick="resetKey()">キー変更</button>
        </div>
    </div>

    <div id="translation-box">
        <div id="translation-label">翻訳結果</div>
        <div id="translation-text" style="color:#555">カメラを英語テキストに向けてください</div>
        <div id="loading-indicator">翻訳中...</div>
    </div>
</div>

<script>
    const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

    // 画像サイズ：横800pxに縮小してAPIに送る（速度・精度のバランス）
    const CAPTURE_WIDTH  = 800;

    // フォーカス枠の割合（カメラ映像の中央80%×70%を切り出す）
    const CROP_X = 0.10;
    const CROP_Y = 0.15;
    const CROP_W = 0.80;
    const CROP_H = 0.70;

    const PROMPT = `画像内の英語テキストを日本語に翻訳してください。

ルール：
- 見えている英語の文・段落を、文脈を保って完全に翻訳する
- 医学・生殖医療・不妊治療の専門用語は正確な日本語訳を使う
- 断片的な単語ではなく、意味のある文単位で訳す
- 英語テキストが見当たらない場合のみ「（テキストなし）」と返す
- 翻訳文だけを返す。説明・前置き・見出しは不要`;

    let apiKey = '';
    let isPaused = false;
    let isProcessing = false;
    let loopActive = false;

    window.onload = () => {
        const saved = localStorage.getItem('gemini_api_key');
        if (saved) { apiKey = saved; startApp(); }
    };

    function saveAndStart() {
        const key = document.getElementById('api-key-input').value.trim();
        if (!key.startsWith('AIza')) {
            alert('APIキーの形式が正しくありません（AIzaで始まるキーを入力してください）');
            return;
        }
        localStorage.setItem('gemini_api_key', key);
        apiKey = key;
        startApp();
    }

    async function startApp() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        await startCamera();
        loopActive = true;
        translationLoop();
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            document.getElementById('video').srcObject = stream;
            await new Promise(r => document.getElementById('video').onloadedmetadata = r);
        } catch (e) {
            alert('カメラへのアクセスが拒否されました。\nChromeのアドレスバー横の🔒をタップしてカメラを許可してください。');
        }
    }

    // 固定インターバルではなく「前の処理が終わったら次を開始」するループ
    async function translationLoop() {
        while (loopActive) {
            if (!isPaused) {
                await captureAndTranslate();
            }
            // 翻訳が速くても最低0.5秒は待つ（連続送信を防ぐ）
            await sleep(500);
        }
    }

    async function captureAndTranslate() {
        if (isProcessing) return;
        const video = document.getElementById('video');
        if (!video.videoWidth) return;

        isProcessing = true;
        showLoading(true);

        // フォーカス枠の領域だけを切り出す
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const sx = vw * CROP_X;
        const sy = vh * CROP_Y;
        const sw = vw * CROP_W;
        const sh = vh * CROP_H;

        // 切り出した領域を800px幅にリサイズ
        const ratio = CAPTURE_WIDTH / sw;
        const canvas = document.createElement('canvas');
        canvas.width  = CAPTURE_WIDTH;
        canvas.height = Math.round(sh * ratio);
        canvas.getContext('2d').drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];

        try {
            const res = await fetch(`${API_URL}?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: PROMPT },
                            { inline_data: { mime_type: 'image/jpeg', data: base64 } }
                        ]
                    }],
                    generationConfig: { maxOutputTokens: 1024, temperature: 0.1 }
                })
            });

            const data = await res.json();

            if (data.error) {
                setStatus('エラー: ' + data.error.message.slice(0, 50));
                isProcessing = false;
                showLoading(false);
                return;
            }

            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() ?? '';
            if (text && text !== '（テキストなし）') {
                document.getElementById('translation-text').style.color = '#f0f0f0';
                document.getElementById('translation-text').textContent = text;
            }

            const t = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            setStatus('✓ ' + t);
        } catch (e) {
            setStatus('ネットワークエラー');
        }

        showLoading(false);
        isProcessing = false;
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('toggle-btn').textContent = isPaused ? '▶ 再開' : '⏸ 停止';
        setStatus(isPaused ? '停止中' : '翻訳中');
    }

    function resetKey() {
        if (!confirm('APIキーをリセットしますか？')) return;
        localStorage.removeItem('gemini_api_key');
        location.reload();
    }

    function showLoading(on) {
        document.getElementById('loading-indicator').style.display = on ? 'block' : 'none';
    }

    function setStatus(msg) {
        document.getElementById('status-text').textContent = msg;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
